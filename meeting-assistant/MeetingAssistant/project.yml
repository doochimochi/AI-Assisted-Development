name: MeetingAssistant
options:
  bundleIdPrefix: com.meetingassistant
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.4"

settings:
  base:
    PRODUCT_NAME: MeetingAssistant
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    OTHER_SWIFT_FLAGS: ""

targets:
  MeetingAssistant:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Sources
      - Resources
    info:
      path: Resources/Info.plist
    entitlements:
      path: Resources/MeetingAssistant.entitlements
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/MeetingAssistant.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.meetingassistant.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
    dependencies: []

schemes:
  MeetingAssistant:
    build:
      targets:
        MeetingAssistant: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
